[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "archyve-common"
version = "0.1.0"
description = "Shared models and indexing utilities for Archyve AI."
requires-python = ">=3.11"

[tool.setuptools.packages.find]
include = ["archyve_common*"]


